<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manga Reader - Catalog</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <nav>
        <a href="index.html" class="logo">MangaReader</a>
        <div class="search-container">
          <input
            type="text"
            class="search-input"
            id="searchInput"
            placeholder="Search manga..."
          />
        </div>
      </nav>
    </header>

    <main>
      <div id="searchResultsSection" class="search-results-section hidden">
        <h2>Search Results</h2>
        <div id="searchResultsRow" class="manga-row"></div>
      </div>

      <div id="homeSections">
        <section class="manga-section">
          <h2>Top Trending</h2>
          <div id="trendingRow" class="manga-row">
            <div class="loading-small">
              <div class="spinner-small"></div>
            </div>
          </div>
        </section>

        <section class="manga-section">
          <h2>Top Manga</h2>
          <div id="topMangaRow" class="manga-row">
            <div class="loading-small">
              <div class="spinner-small"></div>
            </div>
          </div>
        </section>

        <section class="manga-section">
          <h2>Top Manwha</h2>
          <div id="topManwhaRow" class="manga-row">
            <div class="loading-small">
              <div class="spinner-small"></div>
            </div>
          </div>
        </section>

        <section class="manga-section">
          <h2>Recently Updated</h2>
          <div id="recentlyUpdatedRow" class="manga-row">
            <div class="loading-small">
              <div class="spinner-small"></div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="js/home.js"></script>
  </body>
</html>
