<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Reader - Catalog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">MangaReader</a>
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="Search manga...">
            </div>
        </nav>
    </header>

    <main>
        <div id="mangaGrid" class="manga-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading manga...</p>
            </div>
        </div>
    </main>

    <script type="module" src="js/catalog.js"></script>
</body>
</html>
