[build]
  publish = "."
  command = "echo 'No build step required'"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/atsumaru/*"
  to = "/.netlify/functions/atsumaru-handler/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/mangakakalot/*"
  to = "/.netlify/functions/mangakakalot-handler/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"
    Content-Security-Policy = "default-src 'self'; connect-src 'self'; img-src 'self' https://uploads.mangadex.org data: blob: https://*.mangadex.org https://*.mangadex.network; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
