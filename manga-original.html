<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Manga details and chapters - Read manga online on Enokku"
    />
    <meta name="theme-color" content="#ff0000" />

    <meta property="og:title" content="Manga Details - Enokku" />
    <meta property="og:type" content="website" />

    <title>Manga Details - Enokku</title>

    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="site-header">
      <div class="container">
        <nav aria-label="Main navigation">
          <a href="index.html" class="logo" aria-label="Enokku Home">Enokku</a>
          <div class="search-container">
            <input
              type="search"
              class="search-input"
              id="searchInput"
              placeholder="Search manga..."
              aria-label="Search manga"
              autocomplete="off"
            />
          </div>
        </nav>
      </div>
    </header>

    <main id="main-content">
      <div class="container">
        <div id="mangaDetails" class="manga-details">
          <div class="loading">
            <div class="spinner"></div>
            <p>Loading manga details...</p>
          </div>
        </div>

        <div id="chapterList" class="chapter-list"></div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>
          &copy; 2024 Enokku. Powered by
          <a href="https://mangadex.org" target="_blank" rel="noopener"
            >MangaDex API</a
          >.
        </p>
      </div>
    </footer>

    <noscript>
      <div class="noscript-warning">
        <p>
          JavaScript is required to use Enokku. Please enable JavaScript in your
          browser settings.
        </p>
      </div>
    </noscript>

    <script type="module" src="js/details.js"></script>
  </body>
</html>
