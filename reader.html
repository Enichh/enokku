<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Read manga chapters online" />
    <meta name="theme-color" content="#ff6b35" />

    <meta property="og:title" content="Read Chapter - MangaReader" />
    <meta property="og:type" content="website" />

    <title>Read Chapter - MangaReader</title>

    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="site-header reader-header-simple">
      <div class="container">
        <nav aria-label="Main navigation">
          <a href="index.html" class="logo" aria-label="MangaReader Home"
            >MangaReader</a
          >
        </nav>
      </div>
    </header>

    <main id="main-content">
      <div class="container">
        <div class="reader">
          <div class="reader-header">
            <h1 id="chapterTitle">Loading...</h1>
            <div class="reader-controls">
              <button id="prevChapter" disabled>Previous</button>
              <button id="nextChapter" disabled>Next</button>
              <button id="backToManga">Back to Manga</button>
            </div>
          </div>
          <div id="readerImages" class="reader-images">
            <div class="loading">
              <div class="spinner"></div>
              <p>Loading chapter...</p>
            </div>
          </div>
          <div class="page-indicator" id="pageIndicator"></div>
          <div class="reader-footer">
            <div class="reader-controls">
              <button id="prevChapterBottom" disabled>Previous Chapter</button>
              <button id="nextChapterBottom" disabled>Next Chapter</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>
          &copy; 2024 MangaReader. Powered by
          <a href="https://mangadex.org" target="_blank" rel="noopener"
            >MangaDex API</a
          >.
        </p>
      </div>
    </footer>

    <button id="backToTop" class="back-to-top" aria-label="Back to top">
      ↑
    </button>

    <noscript>
      <div class="noscript-warning">
        <p>
          JavaScript is required to use MangaReader. Please enable JavaScript in
          your browser settings.
        </p>
      </div>
    </noscript>

    <script type="module" src="js/reader.js"></script>
  </body>
</html>
