<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Read manga chapters online - Enokku reader"
    />
    <meta name="theme-color" content="#ff0000" />

    <meta property="og:title" content="Reader - Enokku" />
    <meta property="og:type" content="website" />

    <title>Reader - Enokku</title>

    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="reader-page">
    <a href="#main-content" class="skip-link">Skip to reader content</a>

    <header class="reader-header">
      <div class="container">
        <nav aria-label="Reader navigation">
          <button id="backToManga" class="btn-secondary" aria-label="Back to manga details">
            ← Back
          </button>
          <h1 id="chapterTitle" class="chapter-title-header">Loading...</h1>
          <span id="pageIndicator" class="page-indicator"></span>
        </nav>
        <div class="chapter-nav-top">
          <button id="prevChapter" class="btn-secondary" disabled>← Previous Chapter</button>
          <button id="nextChapter" class="btn-secondary" disabled>Next Chapter →</button>
        </div>
      </div>
    </header>

    <main id="main-content">
      <div class="container">
        <div id="readerImages" class="reader-images" role="img" aria-label="Manga pages">
          <div class="loading">
            <div class="spinner"></div>
            <p>Loading chapter...</p>
          </div>
        </div>
      </div>
    </main>

    <footer class="reader-footer">
      <div class="container">
        <div class="chapter-nav-bottom">
          <button id="prevChapterBottom" class="btn-secondary" disabled>← Previous Chapter</button>
          <button id="backToTop" class="btn-secondary" aria-label="Back to top">↑ Top</button>
          <button id="nextChapterBottom" class="btn-secondary" disabled>Next Chapter →</button>
        </div>
      </div>
    </footer>

    <noscript>
      <div class="noscript-warning">
        <p>
          JavaScript is required to use Enokku. Please enable JavaScript in your
          browser settings.
        </p>
      </div>
    </noscript>

    <script type="module" src="js/reader-hybrid.js"></script>
  </body>
</html>
