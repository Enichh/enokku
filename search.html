<!doctype html>
<html lang="en" style="background-color: #0a0a0a">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Search and discover manga, manhwa, and manhua on Enokku"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#ff0000" />

    <meta property="og:title" content="Search Manga - Enokku" />
    <meta property="og:type" content="website" />

    <title>Search Manga - Enokku</title>

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/utilities.css" />
    <link rel="stylesheet" href="css/cards.css" />
    <link rel="stylesheet" href="css/search.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/bottom-nav.css" />
  </head>
  <body class="search-page">
    <!-- Header -->
    <header class="site-header search-header-compact">
      <div class="container">
        <nav aria-label="Main navigation">
          <a href="index.html" class="logo" aria-label="Enokku Home">Enokku</a>
          <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="search.html" class="nav-link active">Search</a>
          </div>
        </nav>
      </div>
    </header>

    <!-- Main Container -->
    <main class="search-container">
      <!-- Filter Sidebar -->
      <aside class="filter-sidebar" id="filterSidebar">
        <!-- Mobile Close Button -->
        <button
          class="filter-close-btn"
          id="filterCloseBtn"
          aria-label="Close filters"
        >
          &#10005;
        </button>
        <!-- Content Type -->
        <div class="filter-section">
          <h3 class="filter-title">Content Type</h3>
          <div class="content-type-tabs" id="contentTypeTabs">
            <!-- Injected by JS -->
          </div>
        </div>

        <!-- Genres -->
        <div class="filter-section">
          <h3 class="filter-title">Genres</h3>
          <div id="excludeModeToggle">
            <!-- Injected by JS -->
          </div>
          <div class="genre-chips" id="genreChips">
            <!-- Injected by JS -->
          </div>
        </div>

        <!-- Year -->
        <div class="filter-section">
          <h3 class="filter-title">Year</h3>
          <div class="year-options" id="yearOptions">
            <!-- Injected by JS -->
          </div>
        </div>

        <!-- Status -->
        <div class="filter-section">
          <h3 class="filter-title">Status</h3>
          <div class="status-options" id="statusOptions">
            <!-- Injected by JS -->
          </div>
        </div>

        <!-- Content Rating -->
        <div class="filter-section">
          <h3 class="filter-title">Content Rating</h3>
          <div class="rating-options" id="contentRatingOptions">
            <!-- Injected by JS -->
          </div>
        </div>

        <!-- Clear Filters -->
        <button class="clear-filters-btn" onclick="clearAllFilters()">
          Clear All Filters
        </button>
      </aside>

      <!-- Main Results Area -->
      <section class="results-main">
        <!-- Search Header -->
        <div class="search-header">
          <div class="search-bar-container">
            <div class="search-input-wrapper">
              <span class="search-icon">&#128269;</span>
              <input
                type="search"
                id="searchInput"
                class="search-input"
                placeholder="Search manga by title..."
                autocomplete="off"
                aria-label="Search manga"
              />
            </div>

            <div class="sort-dropdown">
              <select
                id="sortSelect"
                class="sort-select"
                aria-label="Sort results"
              >
                <option value="relevance">Relevance</option>
                <option value="latest">Latest Updated</option>
                <option value="trending">Trending</option>
                <option value="rating">Top Rated</option>
                <option value="newest">Newest Added</option>
                <option value="alphabetical">Alphabetical</option>
              </select>
              <span class="sort-arrow">&#9662;</span>
            </div>
          </div>

          <!-- Active Filters -->
          <div class="active-filters" id="activeFilters">
            <!-- Injected by JS -->
          </div>

          <!-- Results Count -->
          <div class="results-count" id="resultsCount"></div>
        </div>

        <!-- Results Section -->
        <div class="results-section">
          <div class="results-grid" id="resultsGrid">
            <!-- Injected by JS -->
          </div>
        </div>

        <!-- Load More -->
        <div class="load-more-container">
          <button class="load-more-btn" id="loadMoreBtn">
            <span>Load More</span>
          </button>
        </div>
      </section>
    </main>

    <!-- Mobile Filter Toggle -->
    <button
      class="mobile-filter-toggle"
      id="mobileFilterToggle"
      aria-label="Open filters"
    ></button>

    <!-- NoScript Warning -->
    <noscript>
      <div class="noscript-warning">
        <p>
          JavaScript is required to use the search feature. Please enable
          JavaScript in your browser settings.
        </p>
      </div>
    </noscript>

    <nav class="bottom-nav" id="bottomNav">
      <a href="index.html" class="bottom-nav-item" data-page="home">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M12 3L4 9v12h6v-6h4v6h6V9L12 3z" />
        </svg>
        <span>Home</span>
      </a>
      <a href="search.html" class="bottom-nav-item active" data-page="search">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path
            d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 0 0 1.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 0 0-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 0 0 5.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
          />
        </svg>
        <span>Search</span>
      </a>
      <a href="library.html" class="bottom-nav-item" data-page="library">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path
            d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-3 2v12l3.5-2 3.5 2V4h-7z"
          />
        </svg>
        <span>Library</span>
      </a>
      <a href="settings.html" class="bottom-nav-item" data-page="settings">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path
            d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L3.16 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.58 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
          />
        </svg>
        <span>Settings</span>
      </a>
    </nav>

    <!-- Scripts -->
    <script type="module" src="js/pwa.js?v=2"></script>
    <script type="module" src="js/search.js?v=2"></script>
  </body>
</html>
