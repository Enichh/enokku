    <header class="site-header">
      <div class="container">
        <nav aria-label="Main navigation">
          <a href="index.html" class="logo" aria-label="Enokku Home">Enokku</a>
          <div class="search-container">
            <input
              type="search"
              class="search-input"
              id="searchInput"
              placeholder="Search manga..."
              aria-label="Search manga"
              autocomplete="off"
            />
          </div>
        </nav>
      </div>
    </header>

    <main id="main-content">
      <div class="container">
        <div id="mangaDetails" class="manga-details">
          <div class="loading">
            <div class="spinner"></div>
            <p>Loading manga details...</p>
          </div>
        </div>

        <div class="download-all-container">
          <button id="downloadAllChaptersBtn">Download All Chapters</button>
          <span id="downloadAllStatus" class="download-status"></span>
        </div>

        <div id="chapterList" class="chapter-list"></div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2026 Enokku. Made with ❤️ by Enoch Gabriel Astor.</p>
